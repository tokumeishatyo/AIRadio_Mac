# ニュース・天気のリサーチ設定（S5）
# いずれも無料・APIキー不要。
news:
  # Google News RSS（日本語・日本版）。max_items 件の見出しを読み上げる。
  rss_url: "https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja"
  max_items: 5
weather:
  # 気象庁 予報 API のエリアコード。例: 東京=130000 / 大阪=270000 / 北海道(石狩)=016000。
  # https://www.jma.go.jp/bosai/forecast/data/forecast/{area_code}.json
  area_code: "130000"
  area_name: "東京地方"   # JSON 内の対象エリア名（areas[].area.name と一致させる）
# {news} と {weather} に取得結果が入る。{hour12}/{minute} は発話直前の時刻（themes.yaml のコメント参照）。
announcement_template: "時刻は{hour12}時{minute}分になりました。ニュースの時間です。{news} 続いて、天気予報です。{weather} 以上、ニュースと天気予報でした。"
