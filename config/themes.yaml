# 統一テーマ/BGM 演出の設定（S3）
# track_uri は BGM に使う Spotify トラック（共有 URL / spotify:track: / 裸 ID いずれも可、自動正規化）。
# デフォルトは動作確認用に再生実績のある同じ曲。好きな曲の URI に差し替え可。
# 演出: (tagline) → BGM フル音量 intro_seconds → ducked_volume へ → 発話 →
#       曲の「残り outro_seconds 秒」へシーク → フル音量に戻す → 曲の終わりで停止
#       （シーク位置 = 曲の長さ - outro_seconds。曲の自然な終わりで終わる）
# 時間帯ごとの挨拶（{greeting} の値。境界はコード側: 朝5-11時/昼12-16時/夜17-4時、Windows版踏襲）
greetings:
  morning: "おはようございます"
  afternoon: "こんにちは"
  evening: "こんばんは"

# announcement では時刻プレースホルダが使える（発話直前に展開、仕様 s8 §3）:
#   {greeting} 時間帯挨拶 / {month}月 {day}日 / {ampm}{hour}時 = 午前/午後+NHK式12時間 /
#   {hour12}時{minute}分 = 午前午後なしの12時間表記
# OP / ED は DJ 別の固定口上（by_dj、口調込み・不変。仕様 s13.5 §4）。その日のメインのものを使う。
# track_uri/intro/volume/ducked/outro の BGM 演出は共有、tagline は DJ 別。
opening:
  track_uri: "https://open.spotify.com/intl-ja/track/5jsqaNOAbeBG5QYL7JpySJ?si=5c452cc8429d4c49"
  intro_seconds: 5
  volume: 100
  ducked_volume: 35
  outro_seconds: 10
  by_dj:
    zundamon:
      tagline: "ずんだもんの ケイラボAIラジオ"
      announcement: "{greeting}。{month}月{day}日、{ampm}{hour}時になりました。ケイラボAIラジオの時間なのだ。お送りするのはずんだもんなのだ。本日もリスナーの皆さんと、ゆったりした時間を過ごしていきたいと思うのだ。なお、本番組の音声合成にはVOICEVOXを使用しているのだ。それでは早速聴いてもらうのだ。{first_song}。"
    metan:
      tagline: "四国めたんの ケイラボAIラジオ"
      announcement: "{greeting}。{month}月{day}日、{ampm}{hour}時になりましたわ。ケイラボAIラジオのお時間です。お送りするのは、わたくし四国めたんですわ。本日もリスナーの皆さまと、ゆったりした時間を過ごしてまいりますわ。なお、本番組の音声合成にはVOICEVOXを使用しております。それでは早速、お聴きくださいませ。{first_song}。"
    tsumugi:
      tagline: "春日部つむぎの ケイラボAIラジオ"
      announcement: "{greeting}ー。{month}月{day}日、{ampm}{hour}時になりました。ケイラボAIラジオのお時間です。お送りするのは、あーし、春日部つむぎでーす。今日もリスナーのみなさんと、ゆるーく過ごしていけたらなって思ってます。本番組の音声合成にはVOICEVOXを使ってるんですよー。それでは早速、聴いてくださいっ。{first_song}。"

news:
  tagline: "ニュースと天気予報です"
  track_uri: "spotify:track:7ovUcF5uHTBRzUpB6ZOmvt"
  intro_seconds: 5
  volume: 100
  ducked_volume: 35
  outro_seconds: 10
  announcement: "本日のニュースをお伝えするのだ。これはダミーのニュース原稿なのだ。詳しい中身は後のスライスで本物のニュースに差し替える予定なのだ。続いて天気予報なのだ。今日は全国的におおむね晴れ、ところにより気まぐれな雨が降るかもしれないのだ。以上、ダミーのニュースと天気予報でした。"

# ED は tagline なし（いきなり BGM）。口上は DJ 別（その日のメインが読む）。
ending:
  track_uri: "spotify:track:5gf9qeUJUHvhp1TkHUJ2sR"
  intro_seconds: 5
  volume: 100
  ducked_volume: 35
  outro_seconds: 10
  by_dj:
    zundamon:
      announcement: "本日も最後までお聴きいただき、ありがとうございましたなのだ。また次回お会いしましょう。それでは、おやすみなさいなのだ。"
    metan:
      announcement: "本日も最後までお聴きいただき、ありがとうございましたわ。また次回お会いしましょう。それでは、ごきげんよう。"
    tsumugi:
      announcement: "今日も最後まで聴いてくれて、ありがとうございましたー。またあーしたちと会えるの、楽しみにしてますね。それじゃ、またね、ばいばーい。"
