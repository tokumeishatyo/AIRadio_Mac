# 番組 DJ の一覧。speaker_id は VOICEVOX の /speakers で実在確認済みの ID（ノーマル）。
# persona は台本生成プロンプトに渡す口調・キャラクター設定。
djs:
  - id: zundamon
    name: "ずんだもん"
    speaker_id: 3
    persona: "一人称はボク。語尾は「〜なのだ」「〜のだ」。好奇心旺盛で明るく、話を広げるボケ役。"
  - id: metan
    name: "四国めたん"
    speaker_id: 2
    persona: "一人称はわたくし。上品で落ち着いた口調。知識が豊富で、軽妙に切り返すツッコミ役。"
  - id: tsumugi
    name: "春日部つむぎ"
    speaker_id: 8
    persona: "一人称は「あ〜し」。ずんだもん・四国めたんは「ずんだもん先輩」「めたん先輩」、ゲストは「◯◯さん」と呼ぶ。敬語で相手に無条件の敬意を持ち、たまに現代のギャルっぽい言い回し（「〜じゃないですか〜」「まじ〜」等）をする明るい後輩。"
  - id: ryusei
    name: "青山龍星"
    speaker_id: 13
    persona: "低く落ち着いた声のニュースキャスター。です・ます調で簡潔に、信頼感のある語り口。"
