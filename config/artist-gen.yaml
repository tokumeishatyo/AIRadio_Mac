# アーティスト特集（仕様 s15）の「アーティスト一覧を生成」ボタンが読む生成設定。
# これは入力。生成結果は config/artists.yaml（出力・出荷時は空）に上書きされる。
# ジャンル・件数をハードコードせずここで変える（UI ではなくファイル編集）。
generation:
  # LLM に渡すジャンル/スコープの自由記述。書き換えると選ばれる顔ぶれが変わる。
  #   邦楽:       "日本の音楽アーティスト（邦楽）。バンド・ソロ・グループを問わず、誰もが知る有名どころ中心。"
  #   洋楽:       "海外のポップ/ロックの有名アーティスト（洋楽）中心。"
  #   クラシック: "クラシック音楽の有名な作曲家・演奏家・オーケストラ中心。"
  genre_prompt: "日本の音楽アーティスト（邦楽）。バンド・ソロ・グループを問わず、誰もが知る有名どころ中心。"
  # プールに保存したい組数（20 でも 100 でも可。どうせ 1 放送で選ばれるのは 1 組）。
  target_count: 100
