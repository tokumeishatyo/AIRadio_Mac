# 番組フォーマット。segments を上から順に実行する（順序の入替え・追加は設定のみで可能）。
# type: opening / talk / news / ending（talk は corners.yaml の corner_id 必須）
# anchor_dj_id: opening / news / ending の読み上げ担当（djs.yaml の id)
# critical: true のセグメントは失敗時にスキップせず放送を中止する（既定 false）
# dj_id: テーマ系セグメント（opening/news/ending）の読み上げ DJ を個別指定（未指定は anchor_dj_id）
program:
  title: "ケイラボAIラジオ"
  anchor_dj_id: zundamon
  segments:
    - type: opening
      critical: true
    # 冒頭曲（本日の 1 曲目）。放送開始時に選曲し、OP の {first_song} で曲振りされる。
    # この曲が流れている間にトークの台本生成が完了する（切れ目ない放送、仕様 s10）。
    - type: song
      song_prompt_hint: "一日の始まりや番組の幕開けに合う、前向きで広く知られた曲"
      fallback_track_uri: "spotify:track:5jsqaNOAbeBG5QYL7JpySJ"
      volume: 100
      play_seconds: 0     # 0 = フル再生
    - type: talk
      corner_id: free_talk
    # お便りコーナー（format: letter、仕様 s12）。お便り → ニュースの順で進む。
    - type: talk
      corner_id: letter
    - type: news
      dj_id: ryusei
    - type: ending
