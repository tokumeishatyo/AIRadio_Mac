# 番組の部品宣言（v2、仕様 s13）。セグメント列はコーナー数 N から自動生成する:
#   opening → song（冒頭曲）→ [talk, talk, letter, news] の繰り返し → ending
#   N はトークコーナーの本数（お便り/ニュースは数えない）。奇数の端数トークの後は ED へ直行。
#   endless は本編を無限に繰り返し ED なし（終了は「放送を停止」または「ED で終了」）。
# default_length: メニュー「番組の長さ」の既定値（10 / 20 / 30 / endless など。1 以上の整数も可）
# opening.critical: OP 失敗で放送を中止する（既定 true、Windows 踏襲）
# news.dj_id: ニュース読み上げ DJ（未指定は anchor_dj_id）
program:
  title: "ケイラボAIラジオ"
  anchor_dj_id: zundamon
  default_length: 10
  opening:
    critical: true
  # 冒頭曲（本日の 1 曲目）。放送開始時に選曲し、OP の {first_song} で曲振りされる。
  song:
    song_prompt_hint: "一日の始まりや番組の幕開けに合う、前向きで広く知られた曲"
    fallback_track_uri: "spotify:track:5jsqaNOAbeBG5QYL7JpySJ"
    volume: 100
    play_seconds: 0     # 0 = フル再生
  talk:
    corner_id: free_talk
  letter:
    corner_id: letter
  news:
    dj_id: ryusei
