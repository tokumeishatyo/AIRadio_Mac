# コーナーテンプレートの一覧。基本パターン: テーマについて DJ 二人が会話し、最後に一曲かける。
# format: free_talk（既定）= テーマトーク / letter = お便り読み上げ → 感想 → リクエスト曲
# themes: テーマのプール。準備のたびにランダムに 1 つ選ぶ（空・未指定なら theme 固定）。
# fallback_track_uri は候補曲が全滅したときの保険
# （共有 URL / spotify:track: / 裸 ID いずれも可、自動正規化）。
# play_seconds: 締めの曲を頭から何秒かけるか。0 = 曲の長さぶんフル再生（既定。終端は位置読み直しで検知）。
# lead_in: 番組途中のコーナーの頭で読む時報リード文（その日のメインが読む。発話直前に時刻展開＝正確）。
#   時刻プレースホルダ: {ampm}午前/午後 {hour}NHK式0-11 {hour12}12時間 {minute}分。冒頭コーナーでは使われない。
corners:
  - id: free_talk
    title: "フリートーク"
    lead_in: "{ampm}{hour}時{minute}分になりました。ここからはフリートークのコーナーです。"
    theme: "最近ちょっと気になっていること"
    themes:
      - "お酒の楽しみ方"
      - "おいしい料理・ごはん"
      - "スイーツ・甘いもの"
      - "旅行・おでかけ"
      - "スポーツ"
      - "音楽の楽しみ方"
      - "映画・ドラマ"
      - "ゲーム"
      - "季節の楽しみ"
      - "最近ちょっと気になっていること"
    dj_ids: [zundamon, metan]
    target_minutes: 5
    chars_per_minute: 320
    song_prompt_hint: "テーマの余韻に合う、よく知られた邦楽・洋楽"
    fallback_track_uri: "spotify:track:5jsqaNOAbeBG5QYL7JpySJ"
    volume: 100
    play_seconds: 0
  - id: letter
    title: "お便りのコーナー"
    lead_in: "{ampm}{hour}時{minute}分になりました。ここからはお便りのコーナーです。"
    format: letter
    theme: "最近ちょっと気になっていること"
    themes:
      - "お酒の楽しみ方"
      - "おいしい料理・ごはん"
      - "スイーツ・甘いもの"
      - "旅行・おでかけ"
      - "スポーツ"
      - "音楽の楽しみ方"
      - "映画・ドラマ"
      - "ゲーム"
      - "季節の楽しみ"
      - "最近ちょっと気になっていること"
    dj_ids: [zundamon, metan]
    target_minutes: 4
    chars_per_minute: 320
    song_prompt_hint: "お便りの内容に寄り添う、よく知られた邦楽・洋楽"
    fallback_track_uri: "spotify:track:5jsqaNOAbeBG5QYL7JpySJ"
    volume: 100
    play_seconds: 0
  # ゲストコーナー（format: guest、仕様 s14）。最初のニュースの直後に 1 回だけ挿入される。
  # ゲストはその日ランダムに選ばれ、{guest}/{theme} は準備時に、時刻は発話直前に展開される。
  - id: guest
    title: "ゲストコーナー"
    format: guest
    lead_in: "{ampm}{hour}時{minute}分になりました。次はゲストコーナーです。本日は{guest}さんを迎えて、{theme}について熱く語ってもらいます。"
    theme: "最近ちょっと気になっていること"
    themes:
      - "お酒の楽しみ方"
      - "おいしい料理・ごはん"
      - "スイーツ・甘いもの"
      - "旅行・おでかけ"
      - "スポーツ"
      - "音楽の楽しみ方"
      - "映画・ドラマ"
      - "ゲーム"
      - "季節の楽しみ"
      - "最近ちょっと気になっていること"
    dj_ids: [zundamon, metan]
    target_minutes: 5
    chars_per_minute: 320
    song_prompt_hint: "ゲストとの会話の余韻に合う、よく知られた邦楽・洋楽"
    fallback_track_uri: "spotify:track:5jsqaNOAbeBG5QYL7JpySJ"
    volume: 100
    play_seconds: 0
  # アーティスト特集（format: artist_feature、仕様 s15）。ゲストコーナーの直後に 1 回だけ挿入される。
  # アーティストは artists.yaml からランダム選定。そのアーティストの最大 7 曲を 3+3+1 で（プレフライト後に縮約）。
  # 曲は実行時に Spotify の top-tracks から取得するので theme/themes/song_prompt_hint は使わない（ローダ要件で記載）。
  # lead_in の {artist} は準備時、時刻は発話直前に展開。{guest}/{theme} は使わない。
  - id: artist_feature
    title: "アーティスト特集"
    format: artist_feature
    lead_in: "{ampm}{hour}時{minute}分になりました。ここからはアーティスト特集です。本日は{artist}さんを特集します。"
    theme: "アーティスト特集"
    dj_ids: [zundamon, metan]
    fallback_track_uri: "spotify:track:5jsqaNOAbeBG5QYL7JpySJ"
    volume: 100
    play_seconds: 0
    # パート別の目標文字数。comment_short_target_chars < comment_target_chars は必須（2 回目の感想は短め）。
    intro_target_chars: 200
    group_intro_target_chars: 320
    comment_target_chars: 400
    comment_short_target_chars: 240
    outro_line: "以上、{artist}特集でした。"
